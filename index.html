<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LexSearch — 法令検索</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:       #080c14;
    --glass:    rgba(13,20,34,0.72);
    --border:   rgba(99,179,237,0.12);
    --border-h: rgba(99,179,237,0.35);
    --accent:   #63b3ed;
    --accent2:  #4fd1c7;
    --text:     #e2e8f0;
    --muted:    #718096;
    --danger:   #fc8181;
    --card-bg:  rgba(15,23,42,0.85);
    --r:        12px;
    --jp:       'Noto Sans JP', sans-serif;
    --en:       'Space Grotesk', sans-serif;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--jp); min-height: 100vh; overflow-x: hidden; }

  .bg-layer {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99,179,237,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 80%, rgba(79,209,199,0.05) 0%, transparent 60%),
      var(--bg);
  }
  .grid-lines {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(99,179,237,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,179,237,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: gridDrift 40s linear infinite;
  }
  @keyframes gridDrift { from { background-position:0 0; } to { background-position:48px 48px; } }

  .wrap { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 0 20px 80px; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 28px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 56px;
  }
  .logo { font-family: var(--en); font-weight: 600; font-size: 1.4rem; letter-spacing: -0.02em; }
  .logo span { color: var(--accent); }
  .badge {
    font-size: 0.65rem; font-family: var(--en); font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--accent); border: 1px solid var(--border-h); border-radius: 4px; padding: 3px 8px;
  }

  .hero { text-align: center; margin-bottom: 48px; }
  .hero-title {
    font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 300; line-height: 1.2;
    letter-spacing: -0.02em; margin-bottom: 12px;
    background: linear-gradient(135deg, var(--text) 40%, var(--accent) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    animation: fadeUp 0.7s ease both;
  }
  .hero-sub { color: var(--muted); font-size: 0.875rem; font-weight: 300; letter-spacing: 0.04em; animation: fadeUp 0.7s 0.1s ease both; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

  .search-wrap { animation: fadeUp 0.7s 0.2s ease both; margin-bottom: 20px; }
  .search-row { display: flex; gap: 10px; }
  .search-input {
    flex: 1; background: var(--glass); border: 1px solid var(--border); border-radius: var(--r);
    padding: 16px 20px; font-size: 1rem; font-family: var(--jp); color: var(--text); outline: none;
    transition: border-color .25s, box-shadow .25s;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,179,237,.12), 0 0 20px rgba(99,179,237,.08); }
  .search-btn {
    background: var(--accent); color: #080c14; border: none; border-radius: var(--r);
    padding: 0 28px; font-size: .875rem; font-family: var(--jp); font-weight: 700;
    cursor: pointer; transition: background .2s, transform .15s; white-space: nowrap;
  }
  .search-btn:hover { background: #90cdf4; transform: translateY(-1px); }
  .search-btn:active { transform: translateY(0); }

  .pills { display: flex; flex-wrap: wrap; gap: 8px; animation: fadeUp 0.7s 0.3s ease both; margin-bottom: 4px; }
  .pill {
    background: var(--glass); border: 1px solid var(--border); border-radius: 50px;
    padding: 5px 14px; font-size: .75rem; color: var(--muted);
    cursor: pointer; transition: border-color .2s, color .2s, background .2s;
    backdrop-filter: blur(8px);
  }
  .pill:hover { border-color: var(--accent); color: var(--accent); background: rgba(99,179,237,.08); }

  .status-bar { display: flex; align-items: center; gap: 10px; min-height: 36px; margin: 20px 0; font-size: .8rem; color: var(--muted); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .dot.loading { animation: blink .8s ease-in-out infinite alternate; }
  .dot.error   { background: var(--danger); }
  .dot.ready   { background: var(--accent2); }
  @keyframes blink { from { opacity:.3; transform:scale(.85); } to { opacity:1; transform:scale(1.15); } }

  .results {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  .result-card {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--r);
    padding: 18px 20px; display: flex; flex-direction: column; justify-content: space-between;
    transition: border-color .22s, background .22s, transform .18s, box-shadow .22s;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    animation: cardIn .35s ease both; opacity: 0; transform: translateY(10px);
    position: relative; overflow: hidden;
  }
  .result-card::before {
    content: ''; position: absolute; inset: 0 auto 0 0; width: 3px;
    background: transparent; transition: background .22s;
  }
  .result-card:hover { border-color: var(--border-h); background: rgba(15,23,42,.98); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,.45); }
  .result-card:hover::before { background: var(--accent); }
  @keyframes cardIn { to { opacity:1; transform:translateY(0); } }

  .law-name { font-size: .95rem; font-weight: 500; line-height: 1.4; margin-bottom: 8px; }
  .law-name mark { background: rgba(99,179,237,.22); color: var(--accent); border-radius: 2px; padding: 0 2px; }
  .law-meta { font-size: .7rem; color: var(--muted); font-family: var(--en); margin-bottom: 14px; line-height: 1.7; }

  .action-link {
    display: flex; align-items: center; justify-content: center; padding: 8px;
    background: rgba(99,179,237,.06); color: var(--accent); text-decoration: none;
    border-radius: 6px; font-size: .8rem; font-weight: 600;
    transition: background .2s, color .2s; border: 1px solid var(--border);
  }
  .result-card:hover .action-link { background: var(--accent); color: #080c14; border-color: var(--accent); }

  .skel-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--r); padding: 18px 20px; display: flex; flex-direction: column; gap: 10px; }
  .skel {
    background: linear-gradient(90deg, rgba(99,179,237,.04) 25%, rgba(99,179,237,.10) 50%, rgba(99,179,237,.04) 75%);
    background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 5px;
  }
  @keyframes shimmer { from { background-position:200% 0; } to { background-position:-200% 0; } }

  .empty { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--muted); animation: fadeUp .4s ease; }
  .empty-icon { font-size: 2.5rem; margin-bottom: 16px; opacity: .4; }

  footer { position: relative; z-index: 1; text-align: center; padding: 32px 0; color: var(--muted); font-size: .72rem; border-top: 1px solid var(--border); margin-top: 40px; line-height: 1.8; }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-h); border-radius: 3px; }

  @media (max-width: 540px) { .results { grid-template-columns: 1fr; } .search-btn { padding: 0 16px; } }
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; } }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="grid-lines"></div>

<div class="wrap">
  <header>
    <div class="logo">Lex<span>Search</span></div>
    <div class="badge">e-Gov API</div>
  </header>

  <section class="hero">
    <h1 class="hero-title">日本の法令を<br>すぐ探す</h1>
    <p class="hero-sub">e-Gov 法令検索 — 全法令データベースをローカルフィルタリングで高速検索</p>
  </section>

  <div class="search-wrap">
    <div class="search-row">
      <input id="searchInput" class="search-input" type="search"
        placeholder="法令名を入力　例: 労働基準法、著作権"
        autocomplete="off" spellcheck="false">
      <button class="search-btn" id="searchBtn">検索</button>
    </div>
  </div>

  <div class="pills">
    <span class="pill" onclick="quickSearch('労働基準法')">労働基準法</span>
    <span class="pill" onclick="quickSearch('民法')">民法</span>
    <span class="pill" onclick="quickSearch('刑法')">刑法</span>
    <span class="pill" onclick="quickSearch('会社法')">会社法</span>
    <span class="pill" onclick="quickSearch('著作権')">著作権法</span>
    <span class="pill" onclick="quickSearch('個人情報')">個人情報保護法</span>
    <span class="pill" onclick="quickSearch('憲法')">日本国憲法</span>
    <span class="pill" onclick="quickSearch('道路交通')">道路交通法</span>
  </div>

  <div class="status-bar">
    <span class="dot loading" id="dot"></span>
    <span id="statusText">法令データベースを読み込み中…</span>
  </div>

  <div class="results" id="results"></div>
</div>

<footer>
  <div style="max-width:960px;margin:0 auto;padding:0 20px">
    データ提供: <a href="https://laws.e-gov.go.jp" target="_blank" rel="noopener">e-Gov 法令検索</a>（デジタル庁）<br>
    本サイトは参考情報です。正確な法令情報は必ず公式サイトでご確認ください。
  </div>
</footer>

<script>
// ─────────────────────────────────────────────────────
//  e-Gov 法令一覧 API v1 — 全件キャッシュ + ローカル検索
//  API: https://elaws.e-gov.go.jp/api/1/lawlists/1
//  同エンドポイントはCORSヘッダーを返すのでプロキシ不要
// ─────────────────────────────────────────────────────

const API_URL     = 'https://elaws.e-gov.go.jp/api/1/lawlists/1';
const LAW_URL     = id => `https://laws.e-gov.go.jp/law/${encodeURIComponent(id)}`;
const DISPLAY_MAX = 120;

let cache = null;

const dom = {
  input:  document.getElementById('searchInput'),
  btn:    document.getElementById('searchBtn'),
  dot:    document.getElementById('dot'),
  text:   document.getElementById('statusText'),
  results:document.getElementById('results'),
};

// ── Status ─────────────────────────────────
function setStatus(msg, state = 'idle') {
  dom.text.textContent = msg;
  dom.dot.className = 'dot' + (state !== 'idle' ? ' ' + state : '');
}

// ── Skeletons ──────────────────────────────
function showSkeletons(n = 6) {
  dom.results.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const c = document.createElement('div');
    c.className = 'skel-card';
    c.innerHTML = `
      <div class="skel" style="width:70%;height:14px"></div>
      <div class="skel" style="width:45%;height:11px"></div>
      <div class="skel" style="width:55%;height:11px"></div>
      <div class="skel" style="width:100%;height:30px;margin-top:4px"></div>
    `;
    dom.results.appendChild(c);
  }
}

// ── Fetch & parse full law list ────────────
async function loadLaws() {
  if (cache) return cache;
  showSkeletons(6);
  setStatus('e-Gov データベースと同期中…', 'loading');
  try {
    const res  = await fetch(API_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const xml  = new DOMParser().parseFromString(await res.text(), 'text/xml');
    const nodes = xml.getElementsByTagName('LawNameListInfo');
    cache = Array.from(nodes).map(n => ({
      name: n.getElementsByTagName('LawName')[0]?.textContent?.trim() ?? '',
      no:   n.getElementsByTagName('LawNo')[0]?.textContent?.trim()   ?? '',
      id:   n.getElementsByTagName('LawId')[0]?.textContent?.trim()   ?? '',
    })).filter(l => l.name);
    dom.results.innerHTML = '';
    setStatus(`同期完了 — ${cache.length.toLocaleString()} 件をインデックス済み　検索してください`, 'ready');
    return cache;
  } catch (e) {
    console.error(e);
    dom.results.innerHTML = '';
    setStatus('データ取得に失敗しました。ページを再読み込みしてください。', 'error');
    return [];
  }
}

// ── Escape + highlight ─────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function highlight(text, kw) {
  if (!kw) return esc(text);
  const re = new RegExp(`(${kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return esc(text).replace(re, '<mark>$1</mark>');
}

// ── Search & render ────────────────────────
async function doSearch() {
  const kw = dom.input.value.trim();
  if (!kw) { setStatus('キーワードを入力してください。', 'error'); return; }

  const laws = await loadLaws();
  if (!laws.length) return;

  dom.results.innerHTML = '';
  const t0 = performance.now();
  const matched = laws.filter(l => l.name.includes(kw));
  const ms = (performance.now() - t0).toFixed(1);

  if (!matched.length) {
    dom.results.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>「${esc(kw)}」に一致する法令が見つかりませんでした。</p></div>`;
    setStatus(`0 件 (${ms}ms)`, 'error');
    return;
  }

  setStatus(`${matched.length.toLocaleString()} 件ヒット (${ms}ms)`, 'ready');

  const frag = document.createDocumentFragment();
  matched.slice(0, DISPLAY_MAX).forEach((law, i) => {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.style.animationDelay = `${i * 0.025}s`;
    card.innerHTML = `
      <div>
        <div class="law-name">${highlight(law.name, kw)}</div>
        <div class="law-meta">No: ${esc(law.no)}<br>ID: ${esc(law.id)}</div>
      </div>
      <a href="${LAW_URL(law.id)}" target="_blank" rel="noopener" class="action-link">📄 条文を開く</a>
    `;
    frag.appendChild(card);
  });
  dom.results.appendChild(frag);

  if (matched.length > DISPLAY_MAX) {
    const more = document.createElement('div');
    more.style.cssText = 'grid-column:1/-1;text-align:center;color:var(--muted);padding:20px;font-size:.8rem';
    more.textContent = `他 ${(matched.length - DISPLAY_MAX).toLocaleString()} 件 — 検索ワードを絞ってください`;
    dom.results.appendChild(more);
  }
}

// ── Helpers ────────────────────────────────
function quickSearch(q) { dom.input.value = q; doSearch(); }

dom.btn.addEventListener('click', doSearch);
dom.input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== dom.input) { e.preventDefault(); dom.input.focus(); }
});

// ── Init ───────────────────────────────────
window.addEventListener('DOMContentLoaded', () => { dom.input.focus(); loadLaws(); });
</script>
</body>
</html>
